<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Onpoint Express Control Panel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Manrope:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main class="app-shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">Security</p>
        <h1>Control Panel</h1>
      </div>
      <div class="topbar-actions">
        <span id="currentUserChip" class="user-chip"></span>
        <a id="openHomeBtn" class="btn btn-outline" href="./index.html">Home</a>
        <a id="openDriversBtn" class="btn btn-outline" href="./drivers.html">Drivers</a>
        <a id="openTrucksBtn" class="btn btn-outline" href="./trucks.html">Trucks</a>
        <a id="openRosterBtn" class="btn btn-outline" href="./roster.html">Roster</a>
        <a id="openFinanceBtn" class="btn btn-outline" href="./finance.html">Finance</a>
        <a id="openLogsBtn" class="btn btn-outline" href="./log.html">Logs</a>
        <button id="logoutBtn" class="btn btn-muted" type="button">Logout</button>
      </div>
    </header>

    <section class="stats-grid" id="securityStats"></section>

    <section class="panel">
      <div class="panel-head">
        <h2>Roles (Access Levels)</h2>
      </div>
      <form id="roleForm" class="form-grid">
        <input type="hidden" id="roleId" />
        <label class="full">Role Name<input id="roleName" type="text" placeholder="Dispatcher" required /></label>
        <div class="full perms-grid" id="permissionsGrid"></div>
        <div class="actions full">
          <button class="btn" type="submit">Save Role</button>
          <button id="cancelRoleEdit" class="btn btn-muted" type="button">Cancel Edit</button>
        </div>
      </form>
      <div class="table-wrap">
        <table>
          <thead>
            <tr><th>Role</th><th>Type</th><th>Permissions</th><th>Actions</th></tr>
          </thead>
          <tbody id="rolesTableBody"></tbody>
        </table>
      </div>
    </section>

    <section class="panel">
      <div class="panel-head">
        <h2>Users</h2>
      </div>
      <form id="userForm" class="form-grid">
        <input type="hidden" id="userId" />
        <label>Username<input id="userName" type="text" required /></label>
        <label>Password<input id="userPassword" type="password" placeholder="Required for new user" /></label>
        <label>Role
          <select id="userRole" required></select>
        </label>
        <label>Status
          <select id="userActive" required>
            <option value="true">Active</option>
            <option value="false">Inactive</option>
          </select>
        </label>
        <div class="actions full">
          <button class="btn" type="submit">Save User</button>
          <button id="cancelUserEdit" class="btn btn-muted" type="button">Cancel Edit</button>
        </div>
      </form>
      <div class="table-wrap">
        <table>
          <thead>
            <tr><th>Username</th><th>Role</th><th>Status</th><th>Actions</th></tr>
          </thead>
          <tbody id="usersTableBody"></tbody>
        </table>
      </div>
    </section>

    <section class="panel">
      <div class="panel-head">
        <h2>Backup & Restore</h2>
      </div>
      <p class="muted">Download all CRM + role/user data to a file and restore it anytime on this device.</p>
      <div class="actions">
        <button id="downloadBackupBtn" class="btn" type="button">Download Backup</button>
        <button id="downloadCategoryBackupsBtn" class="btn btn-outline" type="button">Download Category Files</button>
        <button id="syncSupabaseBtn" class="btn btn-outline" type="button">Sync Local Data to Supabase</button>
        <button id="restoreBackupBtn" class="btn btn-outline" type="button">Restore Backup</button>
      </div>
      <div class="actions" style="margin-top: 0.6rem;">
        <input id="backupFileInputVisible" type="file" accept=".json,application/json" />
        <input id="backupFileInput" type="file" accept=".json,application/json" style="display:none" />
        <button id="importBackupBtn" class="btn btn-outline" type="button">Import Selected Backup</button>
      </div>
      <div class="panel" style="margin-top: 0.8rem;">
        <div class="panel-head">
          <h3 style="margin: 0;">Supabase Connection</h3>
        </div>
        <form id="supabaseConfigForm" class="form-grid" autocomplete="off">
          <label class="full">Supabase URL
            <input id="supabaseUrlInput" type="text" placeholder="https://your-project.supabase.co" />
          </label>
          <label class="full">Anon Public Key
            <input id="supabaseAnonKeyInput" type="text" placeholder="eyJ..." />
          </label>
          <div class="actions full">
            <button id="saveSupabaseConfigBtn" class="btn btn-outline" type="button">Save Connection</button>
            <button id="testSupabaseBtn" class="btn btn-outline" type="button">Test Connection</button>
            <button id="clearSupabaseConfigBtn" class="btn btn-muted" type="button">Clear Connection</button>
          </div>
        </form>
        <p id="supabaseConfigStatus" class="muted"></p>
      </div>
      <p id="backupStatus" class="muted"></p>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./supabase-config.js?v=20260413c"></script>
  <script src="./supabase-client.js?v=20260413c"></script>
  <script src="./seed-data.js?v=20260413c"></script>
  <script src="./auth.js?v=20260413c"></script>
  <script src="./control-panel.js?v=20260413c"></script>
  <script src="./emergency-fill.js?v=20260413c"></script>
</body>
</html>
