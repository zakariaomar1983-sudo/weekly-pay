<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Onpoint Express Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Manrope:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main class="app-shell app-auth">
    <section class="panel auth-panel">
      <p class="eyebrow">Onpoint Express</p>
      <h1>Secure Login</h1>
      <p class="muted">Use your username and password to access CRM tools.</p>

      <form id="loginForm" class="form-grid" autocomplete="off">
        <label>Username<input id="username" type="text" required /></label>
        <label>Password<input id="password" type="password" required /></label>
        <div class="actions full">
          <button class="btn" type="submit">Login</button>
        </div>
      </form>

      <section id="firstRunPanel" style="display:none; margin-top: 1rem;">
        <h2 style="margin-bottom: 0.5rem;">Create Admin Account</h2>
        <p class="muted">No users found on this device yet. Create Admin, and optionally Ops Manager + GM logins.</p>
        <form id="firstRunForm" class="form-grid" autocomplete="off">
          <label>Admin Username<input id="firstRunUsername" type="text" required /></label>
          <label>Admin Password<input id="firstRunPassword" type="password" required /></label>
          <label>Ops Manager Username (optional)<input id="firstRunOpsManagerUsername" type="text" /></label>
          <label>Ops Manager Password (optional)<input id="firstRunOpsManagerPassword" type="password" /></label>
          <label>GM Username (optional)<input id="firstRunGmUsername" type="text" /></label>
          <label>GM Password (optional)<input id="firstRunGmPassword" type="password" /></label>
          <div class="actions full">
            <button class="btn" type="submit">Create Users & Login</button>
          </div>
        </form>
      </section>

      <p id="loginError" class="error-text"></p>
    </section>
  </main>

  <script src="./auth.js?v=20260412e"></script>
  <script src="./login.js?v=20260412e"></script>
</body>
</html>
