<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Onpoint Express Trucks</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Manrope:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main class="app-shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">Fleet</p>
        <h1>Truck Data</h1>
      </div>
      <div class="topbar-actions">
        <span id="currentUserChip" class="user-chip"></span>
        <a class="btn btn-outline" href="./index.html">Home</a>
        <a class="btn btn-outline" href="./drivers.html">Drivers</a>
        <a id="rosterLink" class="btn btn-outline" href="./roster.html">Roster</a>
        <a id="financeLink" class="btn btn-outline" href="./finance.html">Finance</a>
        <a class="btn btn-outline" href="./log.html">Logs</a>
        <a id="controlPanelLink" class="btn btn-outline" href="./control-panel.html">Control Panel</a>
        <button id="logoutBtn" class="btn btn-muted" type="button">Logout</button>
      </div>
    </header>

    <section class="stats-grid" id="trucksStats"></section>

    <section class="panel" id="trucksPanel">
      <div class="panel-head">
        <h2>Truck Details</h2>
      </div>
      <div id="regoAlertsPanel" class="panel-head">
        <p id="regoAlertsMeta" class="muted"></p>
        <div class="actions">
          <button id="enableRegoNotifications" class="btn btn-outline" type="button">Enable Rego Notifications</button>
        </div>
      </div>
      <div id="regoAlertsList" class="muted"></div>
      <form class="form-grid" onsubmit="return false;">
        <label class="full">Search History
          <input id="trucksSearch" type="text" placeholder="Search truck #, registration, model, rego expiry, status..." />
        </label>
        <div class="actions full">
          <button id="clearTrucksFilters" class="btn btn-outline" type="button">Clear Filters</button>
        </div>
      </form>
      <form id="trucksForm" class="form-grid">
        <input type="hidden" id="truckDetailsId" />
        <label>Truck Number<input id="truckDetailsNumber" type="text" placeholder="Truck 12" required /></label>
        <label>Registration<input id="truckRegistration" type="text" required /></label>
        <label>Model<input id="truckModel" type="text" required /></label>
        <label>Capacity (tonnes)<input id="truckCapacity" type="number" min="0" step="0.1" required /></label>
        <label>Service Due<input id="serviceDueDate" type="date" required /></label>
        <label>Rego Expiry Date<input id="regoExpiryDate" type="date" required /></label>
        <label>Truck Status
          <select id="truckStatus" required>
            <option value="Available">Available</option>
            <option value="In Service">In Service</option>
            <option value="Under Repair">Under Repair</option>
          </select>
        </label>
        <label class="full">Notes<input id="truckNotes" type="text" placeholder="Any notes" /></label>
        <div class="actions full">
          <button class="btn" type="submit">Save Truck</button>
          <button id="cancelTruckEdit" class="btn btn-muted" type="button">Cancel Edit</button>
          <button id="exportTrucks" class="btn btn-outline" type="button">Export CSV</button>
        </div>
        <p id="trucksInfo" class="muted full"></p>
      </form>
      <div class="table-wrap">
        <table>
          <thead>
            <tr><th>Truck #</th><th>Registration</th><th>Model</th><th>Capacity</th><th>Service Due</th><th>Rego Expiry</th><th>Status</th><th>Actions</th></tr>
          </thead>
          <tbody id="trucksTableBody"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./supabase-config.js?v=20260412a"></script>
  <script src="./supabase-client.js?v=20260412a"></script>
  <script src="./auth.js?v=20260412a"></script>
  <script src="./trucks.js?v=20260412a"></script>
</body>
</html>
