<!DOCTYPE html>
<html lang="en">
<head>

    <script>
    (function ensureHttpMode() {
      if (window.location.protocol !== "file:") return;
      var fileName = (window.location.pathname.split("/").pop() || "index.html");
      var target = "http://127.0.0.1:4173/" + fileName + (window.location.search || "") + (window.location.hash || "");
      var timeout = new Promise(function (_, reject) {
        setTimeout(function () { reject(new Error("timeout")); }, 1200);
      });
      Promise.race([
        fetch("http://127.0.0.1:4173/index.html", { mode: "no-cors" }),
        timeout
      ]).then(function () {
        window.location.replace(target);
      }).catch(function () {
        document.addEventListener("DOMContentLoaded", function () {
          var note = document.createElement("div");
          note.style.cssText = "position:fixed;left:12px;right:12px;bottom:12px;z-index:9999;background:#fff3cd;color:#5b4a00;border:1px solid #ffe69c;border-radius:10px;padding:10px 12px;font:14px/1.4 sans-serif;";
          note.textContent = "Local server is not running. To load shared records reliably, start local-server.js (or open open-onpoint-express.cmd), then refresh.";
          document.body.appendChild(note);
        });
      });
    })();
  </script>
<title>Onpoint Express Roster Confirmation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Manrope:wght@400;500;700&display=swap" rel="stylesheet" />

<body>
  <main class="app-shell">
    <section class="panel" style="max-width: 760px; margin: 40px auto;">
      <div class="panel-head">
        <div>
          <p class="eyebrow">Driver Confirmation</p>
          <h1 id="confirmTitle">Checking roster link...</h1>
        </div>
      </div>
      <p id="confirmMeta" class="muted">Please wait while we load your weekly roster confirmation.</p>
      <div class="stats-grid">
        <article class="stat-card">
          <p>Current Status</p>
          <h3 id="confirmStatusText">Loading...</h3>
        </article>
        <article class="stat-card">
          <p>Week Start</p>
          <h3 id="confirmWeekText">Loading...</h3>
        </article>
      </div>
      <p id="confirmFeedback" class="data-status muted">Opening this page marks the roster as viewed.</p>
      <div class="actions">
        <button id="confirmRosterBtn" class="btn" type="button">Confirm Week View</button>
        <button id="refreshConfirmBtn" class="btn btn-outline" type="button">Refresh Status</button>
      </div>
    </section>
  </main>

  <script src="./roster-confirm.js?v=20260422e"></script>
